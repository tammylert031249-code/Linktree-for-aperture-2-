<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berg — The Aperture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0C0C0C;
      --surface:   #161616;
      --border:    rgba(255,255,255,0.07);
      --border-h:  rgba(255,255,255,0.14);
      --text:      #F0F0EE;
      --muted:     #666662;
      --gold:      #D4A847;
      --gold-dim:  rgba(212,168,71,0.10);
      --radius-btn: 14px;
      --radius-card: 20px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 20px 64px;
    }

    /* ─── Card ─── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-card);
      padding: 36px 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ─── Avatar ─── */
    .avatar-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      margin-bottom: 20px;
    }

    .avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      opacity: 0.4;
    }

    .avatar-ring::before {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 0.5px solid var(--gold);
      opacity: 0.3;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: #222;
    }

    .avatar-fallback {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 0.5px solid rgba(212,168,71,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: -0.5px;
    }

    /* ─── Identity ─── */
    .name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.4px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .role {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.01em;
      margin-bottom: 32px;
      text-align: center;
      line-height: 1.5;
    }

    .role em {
      font-style: normal;
      color: var(--gold);
    }

    /* ─── Divider ─── */
    .divider {
      width: 100%;
      height: 0.5px;
      background: var(--border);
      margin-bottom: 24px;
    }

    /* ─── Links ─── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-radius: var(--radius-btn);
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--text);
      background: rgba(255,255,255,0.04);
      border: 0.5px solid var(--border);
      transition:
        background 0.18s var(--ease),
        border-color 0.18s var(--ease),
        transform 0.15s var(--ease);
      cursor: pointer;
      touch-action: manipulation;
      min-height: 52px;
      position: relative;
      overflow: hidden;
    }

    .link-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: var(--border-h);
    }

    .link-btn:active {
      transform: scale(0.98);
    }

    .link-btn:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    /* Icon dot */
    .btn-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-icon svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .btn-label { flex: 1; }

    .btn-arrow {
      color: var(--muted);
      font-size: 16px;
      transition: transform 0.15s var(--ease);
    }

    .link-btn:hover .btn-arrow {
      transform: translateX(2px);
    }

    /* Brand colors */
    .yt  .btn-icon { background: rgba(255, 48, 48, 0.12); }
    .yt  .btn-icon svg { fill: #FF3030; }
    .yt:hover { border-color: rgba(255,48,48,0.2); }

    .fb  .btn-icon { background: rgba(24, 119, 242, 0.12); }
    .fb  .btn-icon svg { fill: #1877F2; }
    .fb:hover { border-color: rgba(24,119,242,0.2); }

    .ig  .btn-icon { background: rgba(225, 48, 108, 0.12); }
    .ig  .btn-icon svg { fill: #E1306C; }
    .ig:hover { border-color: rgba(225,48,108,0.2); }

    .lab .btn-icon { background: var(--gold-dim); }
    .lab .btn-icon svg { fill: var(--gold); }
    .lab:hover { border-color: rgba(212,168,71,0.25); }

    /* ─── Footer ─── */
    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    @media (max-width: 440px) {
      body { padding: 24px 12px 48px; }
      .card { padding: 28px 20px 24px; border-radius: 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .link-btn { transition: none; }
    }
  </style>
</head>
<body>
